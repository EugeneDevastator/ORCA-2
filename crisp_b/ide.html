<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stack Machine IDE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toolbar">
  <button onclick="loadFib()">Fib Example</button>
  <span style="color:#999">|</span>
  <button onclick="doStepOp()">Step Op</button>
  <button onclick="doStepLine()">Step Line</button>
  <button onclick="doRunAll()">Run</button>
  <span style="color:#999">|</span>
  <button onclick="doReset()">Reset</button>
  <button onclick="doClearAll()">Clear All</button>
</div>

<div id="panels">
  <div class="panel">
    <div class="panel-title">Code</div>
    <textarea id="code" spellcheck="false"></textarea>
  </div>
  <div class="panel">
    <div class="panel-title">Runtime</div>
    <div class="scroll-content" id="runtime"></div>
  </div>
  <div class="panel" style="max-width:120px;min-width:80px;flex:none;">
    <div class="panel-title">Stack</div>
    <div class="scroll-content" id="stackview"></div>
  </div>
  <div class="panel" id="varview">
    <div class="panel-title">Variables</div>
    <div class="scroll-content" id="vardisp"></div>
  </div>
</div>

<div id="status">Ready.</div>

<script src="ops.js"></script>
<script>
// ── Example program ───────────────────────────────────────────────────────────
const FIB = `0 a SET
1 b SET
0 s SET
a b flist SETL
0 13 1 i FOR
    a b SUM _ c SETV
    c: flist APD
    c s SUM _ s SETV
    b a SETV
    c b SETV
END
s LOG
flist LOG`;

// ── Tokenizer ─────────────────────────────────────────────────────────────────
function tokenize(line) {
  let s = line.replace(/\/\/.*$/, '').trim();
  let tokens = [];
  let i = 0;
  while (i < s.length) {
    while (i < s.length && s[i] === ' ') i++;
    if (i >= s.length) break;
    if (s[i] === '"') {
      let j = i + 1;
      while (j < s.length && s[j] !== '"') j++;
      tokens.push({ raw: s.slice(i, j+1), kind:'lit', val: mkStr(s.slice(i+1, j)) });
      i = j + 1; continue;
    }
    let j = i;
    while (j < s.length && s[j] !== ' ') j++;
    let tok = s.slice(i, j); i = j;
    tokens.push(classifyToken(tok));
  }
  return tokens;
}

function classifyToken(tok) {
  if (/^[a-zA-Z_][a-zA-Z0-9_]*:$/.test(tok))
    return { raw: tok, kind:'deref', name: tok.slice(0,-1) };
  if (tok === 'true')  return { raw: tok, kind:'lit', val: mkBool(true) };
  if (tok === 'false') return { raw: tok, kind:'lit', val: mkBool(false) };
  if (tok === '_')     return { raw: tok, kind:'op',  op: '_' };
  if (tok === ';')     return { raw: tok, kind:'op',  op: ';' };
  if (/^-?\d+$/.test(tok))       return { raw: tok, kind:'lit', val: mkInt(parseInt(tok)) };
  if (/^-?\d+\.\d+$/.test(tok))  return { raw: tok, kind:'lit', val: mkFlt(parseFloat(tok)) };
  if (OP_NAMES.has(tok))         return { raw: tok, kind:'op',  op: tok };
  if (tok === 'FOR')             return { raw: tok, kind:'op',  op: 'FOR' };
  if (tok === 'END')             return { raw: tok, kind:'op',  op: 'END' };
  if (/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(tok)) return { raw: tok, kind:'sym', name: tok };
  return { raw: tok, kind:'unknown' };
}

// ── Parser ────────────────────────────────────────────────────────────────────
function parseProgram(src) {
  let srcLines = src.split('\n');
  let prog = [];
  for (let i = 0; i < srcLines.length; i++) {
    let trimmed = srcLines[i].trim();
    prog.push({ srcIdx: i, tokens: tokenize(trimmed), raw: trimmed });
  }
  let forStack = [];
  for (let i = 0; i < prog.length; i++) {
    let toks = prog[i].tokens;
    let hasFor = toks.some(t => t.kind==='op' && t.op==='FOR');
    let hasEnd = toks.length === 1 && toks[0].kind==='op' && toks[0].op==='END';
    if (hasFor) { forStack.push(i); prog[i].isFor = true; }
    if (hasEnd) {
      prog[i].isEnd = true;
      if (forStack.length > 0) {
        let fi = forStack.pop();
        prog[fi].endPC = i;
        prog[i].forPC  = fi;
      }
    }
  }
  return prog;
}

// ── State ─────────────────────────────────────────────────────────────────────
let S = null;

function makeState(src) {
  let prog = parseProgram(src);
  let display = prog.map(() => ({ rtParts: [], stackSnap: [], visited: false }));
  return { prog, display, pc: 0, opIdx: 0, stack: [], env: {}, logs: [], loopStack: [], done: false };
}

// ── Execution ─────────────────────────────────────────────────────────────────
function stepOneOp() {
  if (!S || S.done) return false;
  let prog = S.prog;

  // skip empty lines
  while (S.pc < prog.length) {
    if (prog[S.pc].tokens.length === 0) {
      S.display[S.pc].visited = true;
      S.display[S.pc].rtParts = [];
      S.display[S.pc].stackSnap = [];
      S.pc++; S.opIdx = 0; S.stack = [];
    } else break;
  }
  if (S.pc >= prog.length) { S.done = true; return false; }

  let line = prog[S.pc];
  let disp = S.display[S.pc];
  if (S.opIdx === 0) { disp.rtParts = []; disp.stackSnap = []; }
  disp.visited = true;

  if (S.opIdx >= line.tokens.length) {
    disp.stackSnap = S.stack.slice();
    S.pc++; S.opIdx = 0; S.stack = [];
    return true;
  }

  let tok = line.tokens[S.opIdx];
  let rt = [];
  let jumped = false;

  // FOR handled in core (needs loopStack + jump)
  if (tok.kind === 'op' && tok.op === 'FOR') {
    let varTok = S.stack.pop();
    let step   = deref(S.stack.pop(), S.env);
    let to     = deref(S.stack.pop(), S.env);
    let from   = deref(S.stack.pop(), S.env);
    if (!varTok || varTok.t !== 'sym') {
      rt.push('FOR!');
    } else {
      let f = toNum(from), t2 = toNum(to), st = toNum(step);
      S.env[varTok.v] = mkNum(f);
      S.loopStack.push({ varName: varTok.v, to: t2, step: st, forPC: S.pc, endPC: line.endPC });
      rt.push('FOR');
      if ((st > 0 && f > t2) || (st < 0 && f < t2)) {
        S.pc = line.endPC + 1; S.opIdx = 0; S.stack = []; jumped = true;
      }
    }
    disp.rtParts.push(...rt);
    if (!jumped) S.opIdx++;
    disp.stackSnap = S.stack.slice();
    return true;
  }

  // END handled in core (needs loopStack + jump)
  if (tok.kind === 'op' && tok.op === 'END') {
    if (!S.loopStack || S.loopStack.length === 0) {
      rt.push('END!');
      disp.rtParts.push(...rt);
      S.opIdx++;
      disp.stackSnap = S.stack.slice();
      return true;
    }
    let loop = S.loopStack[S.loopStack.length - 1];
    let cur = toNum(S.env[loop.varName]) + loop.step;
    S.env[loop.varName] = mkNum(cur);
    let cont = loop.step > 0 ? cur <= loop.to : cur >= loop.to;
    if (cont) { S.pc = loop.forPC + 1; S.opIdx = 0; S.stack = []; }
    else       { S.loopStack.pop(); S.pc++; S.opIdx = 0; S.stack = []; }
    rt.push('END');
    disp.rtParts.push(...rt);
    disp.stackSnap = S.stack.slice();
    return true;
  }

  execTok(tok, S.stack, S.env, S.logs, rt);
  disp.rtParts.push(...rt);
  S.opIdx++;

  if (S.opIdx >= line.tokens.length) {
    disp.stackSnap = S.stack.slice();
    S.pc++; S.opIdx = 0; S.stack = [];
  } else {
    disp.stackSnap = S.stack.slice();
  }
  return true;
}

function execTok(tok, stack, env, logs, rt) {
  if (tok.kind === 'lit') {
    stack.push(tok.val); rt.push(valStr(tok.val)); return;
  }
  if (tok.kind === 'deref') {
    let val = env[tok.name];
    if (val !== undefined) { stack.push(val); rt.push(tok.raw); }
    else rt.push(tok.raw + '?');
    return;
  }
  if (tok.kind === 'sym') {
    stack.push(mkSym(tok.name)); rt.push(tok.raw); return;
  }
  if (tok.kind === 'unknown') { rt.push(tok.raw + '?'); return; }

  let op = tok.op;
  if (op === '_') {
    let top = stack.pop();
    if (top === undefined) { rt.push('_!'); return; }
    let val = deref(top, env);
    stack.push(val); rt.push(valStr(val)); return;
  }
  if (op === ';') { rt.push(';'); return; }

  let handler = OP_MAP[op];
  if (handler) { handler(stack, env, logs, rt); return; }
  rt.push(op + '?');
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function ensureState() {
  if (!S) { S = makeState(document.getElementById('code').value); renderAll(); }
}

function doStepOp() {
  ensureState(); stepOneOp(); renderAll();
  setStatus(S.done ? 'Done.' : 'pc=' + S.pc + ' op=' + S.opIdx);
}

function doStepLine() {
  ensureState();
  if (S.done) { setStatus('Done.'); return; }
  let startPc = S.pc, limit = 100000;
  while (!S.done && S.pc === startPc && limit-- > 0) stepOneOp();
  renderAll();
  setStatus(S.done ? 'Done.' : 'pc=' + S.pc);
}

function doRunAll() {
  ensureState();
  let limit = 2000000;
  while (!S.done && limit-- > 0) stepOneOp();
  setStatus(limit <= 0 ? 'ERR: step limit' : 'Done. logs=' + S.logs.length);
  renderAll();
}

function doReset()   { S = null; clearDisplays(); setStatus('Reset.'); }
function doClearAll(){ S = null; document.getElementById('code').value = ''; clearDisplays(); setStatus('Cleared.'); }
function loadFib()   { document.getElementById('code').value = FIB; S = null; clearDisplays(); setStatus('Loaded Fib.'); }

// ── Render ────────────────────────────────────────────────────────────────────
function renderTokSpan(tok) {
  let cls = '';
  if (tok.kind === 'lit')     cls = 'tok-lit';
  else if (tok.kind === 'sym')    cls = 'tok-sym';
  else if (tok.kind === 'op')     cls = 'tok-op';
  else if (tok.kind === 'deref')  cls = 'tok-deref';
  else if (tok.kind === 'unknown') cls = 'tok-err';
  return '<span class="' + cls + '">' + esc(tok.raw) + '</span>';
}

function renderAll() {
  if (!S) return;
  let prog = S.prog;
  let rtEl = document.getElementById('runtime');
  let stEl = document.getElementById('stackview');
  let rtRows = [], stRows = [];

  for (let i = 0; i < prog.length; i++) {
    let disp = S.display[i];
    let isCurrent = (i === S.pc && !S.done);
    let cls = isCurrent ? 'current' : '';

    let rtText;
    if (disp.rtParts.length) {
      rtText = disp.rtParts.join(' ');
    } else if (!disp.visited) {
      // show highlighted source tokens
      rtText = prog[i].tokens.map(renderTokSpan).join(' ');
      rtRows.push('<div class="line-row ' + cls + '">' + rtText + '</div>');
      stRows.push('<div class="line-row ' + cls + '">' + esc(disp.stackSnap.map(valStr).join(' ')) + '</div>');
      continue;
    } else {
      rtText = '';
    }

    rtRows.push('<div class="line-row ' + cls + '">' + esc(rtText) + '</div>');
    stRows.push('<div class="line-row ' + cls + '">' + esc(disp.stackSnap.map(valStr).join(' ')) + '</div>');
  }

  rtEl.innerHTML = rtRows.join('');
  stEl.innerHTML = stRows.join('');

  document.getElementById('vardisp').innerHTML = Object.entries(S.env).map(([k,v]) =>
    '<div class="var-entry"><span class="var-name">' + esc(k) + '</span>=<span class="var-val">' + esc(valStr(v)) + '</span></div>'
  ).join('');

  if (!S.done) {
    let cur = rtEl.querySelector('.current');
    if (cur) cur.scrollIntoView({ block: 'nearest' });
  }
}

function clearDisplays() {
  document.getElementById('runtime').innerHTML = '';
  document.getElementById('stackview').innerHTML = '';
  document.getElementById('vardisp').innerHTML = '';
}

function setStatus(s) { document.getElementById('status').textContent = s; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
