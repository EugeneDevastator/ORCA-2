<!DOCTYPE html>
<html>
<head>
<title>Grid Lang</title>
<style>
  body { background: #1a1a1a; color: #ccc; font-family: monospace; margin: 20px; }
  h2 { color: #fff; }
  #grid-container { overflow: auto; margin-bottom: 16px; position: relative; display: inline-block; }
  table { border-collapse: collapse; position: relative; z-index: 1; }
  col { width: 28px; }
  td {
    border: 1px solid #222; padding: 0;
    width: 28px; height: 20px; min-width: 28px;
    position: relative; overflow: visible; box-sizing: border-box;
  }
  td.empty { background: #111; }
  td.number-cell { background: #1a1a2e; }
  td.operator-cell { background: #2a1a1a; }
  td.string-cell { background: #1a2a2a; }
  td.selected { outline: 2px solid #aaa; z-index: 10; }
  td span.cell-label { display: block; white-space: nowrap; font-size: 12px; line-height: 20px; padding: 0 2px; pointer-events: none; }
  td.empty span.cell-label { color: #333; }
  td.number-cell span.cell-label { color: #6af; }
  td.operator-cell span.cell-label { color: #fa6; }
  td.string-cell span.cell-label { color: #a6f; }
  td input {
    position: absolute; top: 0; left: 0; min-width: 80px; height: 20px;
    background: #222; border: 1px solid #888; color: #fff;
    font-family: monospace; font-size: 12px; padding: 0 2px;
    box-sizing: border-box; outline: none; z-index: 20;
  }
  #controls { margin-bottom: 12px; }
  button { background: #333; color: #ccc; border: 1px solid #555; padding: 4px 10px; margin-right: 6px; cursor: pointer; font-family: monospace; }
  button:hover { background: #444; }
  #log { background: #111; border: 1px solid #333; padding: 8px; height: 100px; overflow-y: auto; font-size: 12px; }
  .log-tick { color: #888; }
  .log-write { color: #8f8; }
  #tick-display { color: #aaa; font-size: 13px; margin-left: 12px; }
  #overlay { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }
</style>
</head>
<body>
<h2>Grid Lang Demo</h2>
<div id="controls">
  <button onclick="tick()">Tick</button>
  <button onclick="toggleRun()">Run</button>
  <button onclick="resetGrid()">Reset</button>
  <button onclick="loadExample()">Load Example</button>
  <label style="margin-left:12px; font-size:12px;">
    <input type="checkbox" id="show-overlay" checked onchange="drawOverlay()"> show scans
  </label>
  <span id="tick-display">tick: 0</span>
</div>
<div id="grid-container">
  <canvas id="overlay"></canvas>
  <div id="table-wrap"></div>
</div>
<div style="margin-bottom:6px; font-size:12px; color:#888;">
  Click cell to edit. Operators: SUMD SUMR MULD MULR IFGR PICKD SUM_TWICE_D F
</div>
<div id="log"></div>

<script>
const ROWS = 12;
const COLS = 40;
const COL_W = 28;
const ROW_H = 22;

let grid = [];
let tickCount = 0;
let running = false;
let runInterval = null;
let selectedCell = null;
let lastScans = [];
let lastWrites = [];

const OPERATORS = ['SUMD','SUMR','MULD','MULR','IFGR','PICKD','SUM_TWICE_D','F'];

const OP_FILL = {
  'SUMR':        'rgba(100,180,255,0.13)',
  'SUMD':        'rgba(100,180,255,0.13)',
  'MULR':        'rgba(255,160,80,0.13)',
  'MULD':        'rgba(255,160,80,0.13)',
  'SUM_TWICE_D': 'rgba(100,255,180,0.13)',
  'IFGR':        'rgba(255,100,180,0.13)',
  'PICKD':       'rgba(200,200,80,0.13)',
  'F':           'rgba(180,100,255,0.13)',
};
const OP_STROKE = {
  'SUMR':        'rgba(100,180,255,0.8)',
  'SUMD':        'rgba(100,180,255,0.8)',
  'MULR':        'rgba(255,160,80,0.8)',
  'MULD':        'rgba(255,160,80,0.8)',
  'SUM_TWICE_D': 'rgba(100,255,180,0.8)',
  'IFGR':        'rgba(255,100,180,0.8)',
  'PICKD':       'rgba(200,200,80,0.8)',
  'F':           'rgba(180,100,255,0.8)',
};

function isOperator(v) { return OPERATORS.includes(v.trim().toUpperCase()); }
function isNumber(v) { let s = v.trim(); return s !== '' && !isNaN(Number(s)); }
function cellType(v) {
  let s = v.trim();
  if (s === '' || s === '.') return 'empty';
  if (isNumber(s)) return 'number-cell';
  if (isOperator(s)) return 'operator-cell';
  return 'string-cell';
}
function cellSpan(v) {
  let s = v.trim();
  if (!isOperator(s)) return 1;
  return Math.max(1, Math.ceil(s.length / 2));
}

function initGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) grid[r][c] = { value: '' };
  }
}

// returns col of owner cell for any col in a span
function getOwner(r, c) {
  let cc = 0;
  while (cc <= c) {
    let v = grid[r][cc].value.trim();
    if (v !== '' && v !== '.') {
      let span = cellSpan(v);
      if (cc + span - 1 >= c) return cc;
      cc += span;
    } else cc++;
  }
  return c;
}

function readVal(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  let owner = getOwner(r, c);
  let v = grid[r][owner].value.trim();
  if (v === '' || v === '.') return null;
  if (isNumber(v)) return Number(v);
  return v;
}

function readLeftN(r, c, n) {
  let vals = [];
  let cc = c - 1;
  while (cc >= 0 && vals.length < n) {
    let owner = getOwner(r, cc);
    let v = grid[r][owner].value.trim();
    if (v !== '' && v !== '.') {
      vals.unshift(isNumber(v) ? Number(v) : v);
      cc = owner - 1;
    } else cc--;
  }
  return vals;
}

function nextNonEmpty(r, startC) {
  for (let c = startC; c < COLS; c++) {
    let v = grid[r][c].value.trim();
    if (v === '0') return -1;
    if (v !== '' && v !== '.') return c;
  }
  return -1;
}

function nthNonEmpty(r, startC, n) {
  let found = 0, c = startC;
  while (c < COLS) {
    let v = grid[r][c].value.trim();
    if (v === '0') return -1;
    if (v !== '' && v !== '.') {
      found++;
      if (found === n) return c;
      c += cellSpan(v);
    } else c++;
  }
  return -1;
}

// find next operator col at or after startC (exclusive of current op)
function nextOperatorCol(r, startC) {
  for (let c = startC; c < COLS; c++) {
    let v = grid[r][c].value.trim().toUpperCase();
    if (isOperator(v)) return c;
  }
  return COLS; // end of row
}

let pendingWrites = [];
function scheduleWrite(r, c, val) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
  pendingWrites.push({ r, c, val: String(val) });
}
function flushWrites() {
  lastWrites = [];
  for (let w of pendingWrites) {
    grid[w.r][w.c].value = w.val;
    lastWrites.push({ r: w.r, c: w.c });
    log(`  write [${w.r},${w.c}] = ${w.val}`, 'log-write');
  }
  pendingWrites = [];
}

function log(msg, cls) {
  let el = document.getElementById('log');
  let line = document.createElement('div');
  line.className = cls || '';
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function tick() {
  tickCount++;
  document.getElementById('tick-display').textContent = 'tick: ' + tickCount;
  log(`--- tick ${tickCount} ---`, 'log-tick');
  pendingWrites = [];
  lastScans = [];

  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      let v = grid[r][c].value.trim().toUpperCase();
      let span = cellSpan(v);
      if (!isOperator(v)) { c++; continue; }

      let rightTarget = c + span;
      let downTarget = r + 1;
      let lefts = readLeftN(r, c, 2);
      let A = lefts.length >= 2 ? lefts[0] : null;
      let B = lefts.length >= 1 ? lefts[lefts.length - 1] : null;

      // scan region: from op col to next op col (exclusive)
      let scanEnd = nextOperatorCol(r, rightTarget) - 1;
      if (scanEnd < c) scanEnd = c + span - 1;

      switch (v) {
        case 'SUMR':
          recordScan(r, c, scanEnd, v);
          if (A !== null && B !== null) scheduleWrite(r, rightTarget, Number(A) + Number(B));
          break;
        case 'SUMD':
          recordScan(r, c, scanEnd, v);
          if (A !== null && B !== null) scheduleWrite(downTarget, c, Number(A) + Number(B));
          break;
        case 'MULR':
          recordScan(r, c, scanEnd, v);
          if (A !== null && B !== null) scheduleWrite(r, rightTarget, Number(A) * Number(B));
          break;
        case 'MULD':
          recordScan(r, c, scanEnd, v);
          if (A !== null && B !== null) scheduleWrite(downTarget, c, Number(A) * Number(B));
          break;
        case 'SUM_TWICE_D':
          recordScan(r, c, scanEnd, v);
          if (A !== null && B !== null) scheduleWrite(downTarget, c, (Number(A) + Number(B)) * 2);
          break;
        case 'IFGR':
          recordScan(r, c, scanEnd, v);
          if (A !== null && B !== null) scheduleWrite(r, rightTarget, Number(A) > Number(B) ? 1 : 0);
          break;
        case 'PICKD': {
          let idx = B !== null ? Math.round(Number(B)) : 0;
          let tc = nthNonEmpty(r, rightTarget, idx);
          let end = tc >= 0 ? tc + cellSpan(grid[r][tc].value.trim()) - 1 : scanEnd;
          recordScan(r, c, end, v);
          if (tc >= 0) {
            let picked = readVal(r, tc);
            if (picked !== null) scheduleWrite(downTarget, c, picked);
          }
          break;
        }
        case 'F': {
          let tc = nextNonEmpty(r, rightTarget);
          let end = tc >= 0 ? tc : scanEnd;
          recordScan(r, c, end, v);
          if (B !== null && tc >= 0) scheduleWrite(r, tc, B);
          break;
        }
      }

      c += span;
    }
  }

  flushWrites();
  renderGrid();
}

function toggleRun() {
  running = !running;
  if (running) runInterval = setInterval(tick, 600);
  else clearInterval(runInterval);
}

function resetGrid() {
  running = false; clearInterval(runInterval);
  tickCount = 0; lastScans = []; lastWrites = [];
  document.getElementById('tick-display').textContent = 'tick: 0';
  document.getElementById('log').innerHTML = '';
  initGrid(); renderGrid();
}

function loadExample() {
  resetGrid();
  grid[0][0].value = '30';
  grid[0][1].value = '25';
  grid[0][2].value = 'IFGR';
  grid[0][4].value = '1';
  grid[0][5].value = 'PICKD';
  grid[0][8].value = 'slow';
  grid[0][13].value = 'fast';

  grid[2][0].value = '3';
  grid[2][1].value = '4';
  grid[2][2].value = 'SUMR';
  grid[2][7].value = '2';
  grid[2][8].value = 'MULR';

  grid[4][0].value = '5';
  grid[4][1].value = '3';
  grid[4][2].value = 'SUM_TWICE_D';
  renderGrid();
}

function recordScan(r, fromC, toC, op) {
  lastScans.push({ r, fromC, toC, op });
}

function renderGrid() {
  let wrap = document.getElementById('table-wrap');
  let html = '<table style="table-layout:fixed;"><colgroup>';
  for (let c = 0; c < COLS; c++) html += '<col>';
  html += '</colgroup>';

  for (let r = 0; r < ROWS; r++) {
    html += '<tr>';
    let c = 0;
    while (c < COLS) {
      let v = grid[r][c].value.trim();
      let span = (v !== '' && v !== '.') ? cellSpan(v) : 1;
      span = Math.min(span, COLS - c);
      let type = cellType(v);
      let isSel = selectedCell && selectedCell.r === r && selectedCell.c === c;
      html += `<td class="${type}${isSel ? ' selected' : ''}" colspan="${span}" data-r="${r}" data-c="${c}" onclick="selectCell(${r},${c})">`;
      if (isSel) {
        html += `<input id="cell-input" value="${grid[r][c].value}" onblur="commitCell(${r},${c},this.value)" onkeydown="cellKey(event,${r},${c})" style="min-width:${Math.max(80,span*COL_W)}px;" />`;
      } else {
        html += `<span class="cell-label">${v}</span>`;
      }
      html += '</td>';
      c += span;
    }
    html += '</tr>';
  }
  html += '</table>';
  wrap.innerHTML = html;

  if (selectedCell) {
    let inp = document.getElementById('cell-input');
    if (inp) { inp.focus(); inp.select(); }
  }

  drawOverlay();
}

function drawOverlay() {
  let canvas = document.getElementById('overlay');
  let show = document.getElementById('show-overlay').checked;
  let tableEl = document.querySelector('#table-wrap table');
  if (!tableEl) { return; }

  let tw = tableEl.offsetWidth;
  let th = tableEl.offsetHeight;
  canvas.width = tw;
  canvas.height = th;
  canvas.style.width = tw + 'px';
  canvas.style.height = th + 'px';

  let ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, tw, th);
  if (!show) return;

  // group scans by row, stack them vertically within the row
  let byRow = {};
  for (let s of lastScans) {
    if (!byRow[s.r]) byRow[s.r] = [];
    byRow[s.r].push(s);
  }

  const PAD = 1;
  const BAND = 6;
  const GAP = 2;

  for (let r in byRow) {
    let scans = byRow[r];
    let rowY = Number(r) * ROW_H;
    let totalBands = scans.length * (BAND + GAP);
    // center bands vertically in row
    let startY = rowY + Math.max(0, (ROW_H - totalBands) / 2);

    for (let i = 0; i < scans.length; i++) {
      let s = scans[i];
      let x = s.fromC * COL_W + PAD;
      let w = (s.toC - s.fromC + 1) * COL_W - PAD * 2;
      let y = startY + i * (BAND + GAP);

      ctx.fillStyle = OP_FILL[s.op] || 'rgba(200,200,200,0.1)';
      ctx.fillRect(x, y, w, BAND);
      ctx.strokeStyle = OP_STROKE[s.op] || 'rgba(200,200,200,0.6)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, w - 1, BAND - 1);

      ctx.fillStyle = OP_STROKE[s.op] || '#aaa';
      ctx.font = '7px monospace';
      ctx.fillText(s.op, x + 3, y + BAND - 1);
    }
  }

  // write dots
  for (let w of lastWrites) {
    let x = w.c * COL_W + COL_W / 2;
    let y = w.r * ROW_H + ROW_H / 2;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(100,255,100,0.9)';
    ctx.fill();
  }
}

function selectCell(r, c) {
  let owner = getOwner(r, c);
  selectedCell = { r, c: owner };
  renderGrid();
}
function commitCell(r, c, val) {
  grid[r][c].value = val; selectedCell = null; renderGrid();
}
function cellKey(e, r, c) {
  if (e.key === 'Enter' || e.key === 'Tab') {
    e.preventDefault();
    commitCell(r, c, e.target.value);
    let span = cellSpan(grid[r][c].value.trim());
    let nr = r, nc = c;
    if (e.key === 'Tab') nc = Math.min(c + span, COLS - 1);
    else nr = Math.min(r + 1, ROWS - 1);
    selectedCell = { r: nr, c: nc };
    renderGrid();
  } else if (e.key === 'Escape') { selectedCell = null; renderGrid(); }
}

initGrid();
renderGrid();
</script>
</body>
</html>
