<!DOCTYPE html>
<html>
<head>
<title>Grid Lang</title>
<style>
  body { background: #1a1a1a; color: #ccc; font-family: monospace; margin: 20px; }
  h2 { color: #fff; }
  #grid-container { overflow: auto; margin-bottom: 16px; position: relative; display: inline-block; }
  table { border-collapse: collapse; position: relative; z-index: 1; }
  td {
    border: 1px solid #222; padding: 0;
    width: 28px; height: 20px; min-width: 28px;
    position: relative; overflow: visible;
    box-sizing: border-box;
  }
  td.empty { background: #111; }
  td.number-cell { background: #1a1a2e; }
  td.operator-cell { background: #2a1a1a; }
  td.string-cell { background: #1a2a2a; }
  td.selected { outline: 2px solid #aaa; z-index: 10; }
  td span.cell-label {
    display: block; white-space: nowrap;
    font-size: 12px; line-height: 20px;
    padding: 0 2px; cursor: pointer; pointer-events: none;
  }
  td.empty span.cell-label { color: #333; }
  td.number-cell span.cell-label { color: #6af; }
  td.operator-cell span.cell-label { color: #fa6; }
  td.string-cell span.cell-label { color: #a6f; }
  td input {
    position: absolute; top: 0; left: 0;
    min-width: 80px; height: 20px;
    background: #222; border: 1px solid #888;
    color: #fff; font-family: monospace; font-size: 12px;
    padding: 0 2px; box-sizing: border-box; outline: none; z-index: 20;
  }
  #controls { margin-bottom: 12px; }
  button { background: #333; color: #ccc; border: 1px solid #555; padding: 4px 10px; margin-right: 6px; cursor: pointer; font-family: monospace; }
  button:hover { background: #444; }
  #log { background: #111; border: 1px solid #333; padding: 8px; height: 100px; overflow-y: auto; font-size: 12px; }
  .log-tick { color: #888; }
  .log-write { color: #8f8; }
  #tick-display { color: #aaa; font-size: 13px; margin-left: 12px; }
  #overlay { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }
</style>
</head>
<body>
<h2>Grid Lang Demo</h2>
<div id="controls">
  <button onclick="tick()">Tick</button>
  <button onclick="toggleRun()">Run</button>
  <button onclick="resetGrid()">Reset</button>
  <button onclick="loadExample()">Load Example</button>
  <label style="margin-left:12px; font-size:12px;">
    <input type="checkbox" id="show-overlay" checked onchange="drawOverlay()"> show scans
  </label>
  <span id="tick-display">tick: 0</span>
</div>
<div id="grid-container">
  <canvas id="overlay"></canvas>
  <div id="table-wrap"></div>
</div>
<div style="margin-bottom:6px; font-size:12px; color:#888;">
  Operators: SUMD SUMR MULD MULR IFGR PICKD SUM_TWICE_D F MAXR MINR SUMALLR
</div>
<div id="log"></div>

<script>
const ROWS = 12;
const COLS = 40;
const COL_W = 29;
const ROW_H = 21;

let grid = [];
let tickCount = 0;
let running = false;
let runInterval = null;
let selectedCell = null;
let lastScans = [];
let lastWrites = [];

const OPERATORS = ['SUMD','SUMR','MULD','MULR','IFGR','PICKD','SUM_TWICE_D','F','MAXR','MINR','SUMALLR'];

const OP_FILL = {
  'SUMR':        'rgba(100,180,255,0.13)',
  'SUMD':        'rgba(100,180,255,0.13)',
  'MULR':        'rgba(255,160,80,0.13)',
  'MULD':        'rgba(255,160,80,0.13)',
  'SUM_TWICE_D': 'rgba(100,255,180,0.13)',
  'IFGR':        'rgba(255,100,180,0.13)',
  'PICKD':       'rgba(200,200,80,0.13)',
  'F':           'rgba(180,100,255,0.13)',
  'MAXR':        'rgba(255,80,80,0.13)',
  'MINR':        'rgba(80,255,220,0.13)',
  'SUMALLR':     'rgba(180,255,80,0.13)',
};
const OP_STROKE = {
  'SUMR':        'rgba(100,180,255,0.8)',
  'SUMD':        'rgba(100,180,255,0.8)',
  'MULR':        'rgba(255,160,80,0.8)',
  'MULD':        'rgba(255,160,80,0.8)',
  'SUM_TWICE_D': 'rgba(100,255,180,0.8)',
  'IFGR':        'rgba(255,100,180,0.8)',
  'PICKD':       'rgba(200,200,80,0.8)',
  'F':           'rgba(180,100,255,0.8)',
  'MAXR':        'rgba(255,80,80,0.8)',
  'MINR':        'rgba(80,255,220,0.8)',
  'SUMALLR':     'rgba(180,255,80,0.8)',
};

function isOperator(v) { return OPERATORS.includes(v.trim().toUpperCase()); }
function isNumber(v)   { let s = v.trim(); return s !== '' && !isNaN(Number(s)); }
function cellType(v) {
  let s = v.trim();
  if (s === '' || s === '.') return 'empty';
  if (isNumber(s)) return 'number-cell';
  if (isOperator(s)) return 'operator-cell';
  return 'string-cell';
}
function cellSpan(v) {
  let s = v.trim();
  if (!isOperator(s)) return 1;
  return Math.max(1, Math.ceil(s.length / 2));
}

function initGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) grid[r][c] = { value: '' };
  }
}

function buildOwnerMap(r) {
  let map = new Array(COLS).fill(-1);
  let c = 0;
  while (c < COLS) {
    let v = grid[r][c].value.trim();
    if (v !== '' && v !== '.') {
      let span = Math.min(cellSpan(v), COLS - c);
      for (let i = 0; i < span; i++) map[c + i] = c;
      c += span;
    } else { map[c] = c; c++; }
  }
  return map;
}

function getOwnerCol(r, c) {
  for (let cc = c; cc >= 0; cc--) {
    let v = grid[r][cc].value.trim();
    if (v === '' || v === '.') continue;
    let span = cellSpan(v);
    if (cc + span - 1 >= c) return cc;
    break;
  }
  return c;
}

function readVal(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  let owner = getOwnerCol(r, c);
  let v = grid[r][owner].value.trim();
  if (v === '' || v === '.') return null;
  if (isNumber(v)) return Number(v);
  return v;
}

// Read exactly N values from left, oldest first. Returns {vals, cols}
function readLeftN(r, c, n) {
  let vals = [], cols = [];
  let cc = c - 1;
  while (cc >= 0 && vals.length < n) {
    let owner = getOwnerCol(r, cc);
    let v = grid[r][owner].value.trim();
    if (v !== '' && v !== '.') {
      vals.unshift(isNumber(v) ? Number(v) : v);
      cols.unshift(owner);
      cc = owner - 1;
    } else cc--;
  }
  return { vals, cols };
}

// Read contiguous number run immediately left of col c.
// Stops (resets) when a non-number non-empty cell is encountered.
// Returns {nums, cols} where cols[0] is leftmost cell col.
function readContiguousNumbersLeft(r, c) {
  let nums = [], cols = [];
  let cc = c - 1;
  while (cc >= 0) {
    let owner = getOwnerCol(r, cc);
    let v = grid[r][owner].value.trim();
    if (v === '' || v === '.') { cc = owner - 1; continue; }
    if (isNumber(v)) {
      nums.unshift(Number(v));
      cols.unshift(owner);
      cc = owner - 1;
    } else {
      // non-number cell: barrier, stop
      break;
    }
  }
  return { nums, cols };
}

function nextNonEmptyRight(r, startC) {
  for (let c = startC; c < COLS; c++) {
    let v = grid[r][c].value.trim();
    if (v === '0') return -1;
    if (v !== '' && v !== '.') return c;
  }
  return -1;
}

function nthNonEmptyRight(r, startC, n) {
  let found = 0, c = startC;
  while (c < COLS) {
    let v = grid[r][c].value.trim();
    if (v === '0') return -1;
    if (v !== '' && v !== '.') {
      found++;
      if (found === n) return c;
      c += cellSpan(v);
    } else c++;
  }
  return -1;
}

function cellEndCol(r, ownerC) {
  let v = grid[r][ownerC] ? grid[r][ownerC].value.trim() : '';
  return ownerC + cellSpan(v) - 1;
}

let pendingWrites = [];
function scheduleWrite(r, c, val) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
  pendingWrites.push({ r, c, val: String(val) });
}
function flushWrites() {
  lastWrites = [];
  for (let w of pendingWrites) {
    grid[w.r][w.c].value = w.val;
    lastWrites.push({ r: w.r, c: w.c });
    log(`  write [${w.r},${w.c}] = ${w.val}`, 'log-write');
  }
  pendingWrites = [];
}

function log(msg, cls) {
  let el = document.getElementById('log');
  let d = document.createElement('div');
  d.className = cls || '';
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function recordScan(r, fromOwnerC, toOwnerC, op) {
  if (toOwnerC < fromOwnerC) toOwnerC = fromOwnerC;
  lastScans.push({ r, fromOwnerC, toOwnerC, op });
}

function tick() {
  tickCount++;
  document.getElementById('tick-display').textContent = 'tick: ' + tickCount;
  log(`--- tick ${tickCount} ---`, 'log-tick');
  pendingWrites = [];
  lastScans = [];

  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      let raw = grid[r][c].value.trim();
      let v = raw.toUpperCase();
      let span = cellSpan(raw);
      if (!isOperator(raw)) { c++; continue; }

      let opEndC   = c + span - 1;
      let rightStart = c + span;

      switch (v) {
        case 'SUMR': case 'SUMD': {
          let { vals, cols } = readLeftN(r, c, 2);
          let fromC = cols.length > 0 ? cols[0] : c;
          recordScan(r, fromC, opEndC, v);
          if (vals.length >= 2) {
            let res = Number(vals[0]) + Number(vals[1]);
            if (v === 'SUMR') scheduleWrite(r, rightStart, res);
            else              scheduleWrite(r + 1, c, res);
          }
          break;
        }
        case 'MULR': case 'MULD': {
          let { vals, cols } = readLeftN(r, c, 2);
          let fromC = cols.length > 0 ? cols[0] : c;
          recordScan(r, fromC, opEndC, v);
          if (vals.length >= 2) {
            let res = Number(vals[0]) * Number(vals[1]);
            if (v === 'MULR') scheduleWrite(r, rightStart, res);
            else              scheduleWrite(r + 1, c, res);
          }
          break;
        }
        case 'SUM_TWICE_D': {
          let { vals: lv, cols: lc } = readLeftN(r, c, 1);
          let rc = nextNonEmptyRight(r, rightStart);
          let fromC = lc.length > 0 ? lc[0] : c;
          let toC   = rc >= 0 ? cellEndCol(r, rc) : opEndC;
          recordScan(r, fromC, toC, v);
          if (lv.length >= 1 && rc >= 0) {
            let B = readVal(r, rc);
            scheduleWrite(r + 1, c, (Number(lv[0]) + Number(B)) * 2);
          }
          break;
        }
        case 'IFGR': {
          let { vals, cols } = readLeftN(r, c, 2);
          let fromC = cols.length > 0 ? cols[0] : c;
          recordScan(r, fromC, opEndC, v);
          if (vals.length >= 2)
            scheduleWrite(r, rightStart, Number(vals[0]) > Number(vals[1]) ? 1 : 0);
          break;
        }
        case 'PICKD': {
          let { vals, cols } = readLeftN(r, c, 1);
          if (vals.length >= 1) {
            let idx = Math.round(Number(vals[0]));
            let tc  = nthNonEmptyRight(r, rightStart, idx);
            let fromC = cols[0];
            let toC   = tc >= 0 ? cellEndCol(r, tc) : opEndC;
            recordScan(r, fromC, toC, v);
            if (tc >= 0) {
              let picked = readVal(r, tc);
              if (picked !== null) scheduleWrite(r + 1, c, picked);
            }
          }
          break;
        }
        case 'F': {
          let { vals, cols } = readLeftN(r, c, 1);
          let tc = nextNonEmptyRight(r, rightStart);
          let fromC = cols.length > 0 ? cols[0] : c;
          let toC   = tc >= 0 ? cellEndCol(r, tc) : opEndC;
          recordScan(r, fromC, toC, v);
          if (vals.length >= 1 && tc >= 0)
            scheduleWrite(r, tc, vals[0]);
          break;
        }
        case 'MAXR': case 'MINR': case 'SUMALLR': {
          // contiguous number run left, barrier on string
          let { nums, cols } = readContiguousNumbersLeft(r, c);
          let fromC = cols.length > 0 ? cols[0] : c;
          recordScan(r, fromC, opEndC, v);
          if (nums.length > 0) {
            let res;
            if (v === 'MAXR')    res = Math.max(...nums);
            else if (v === 'MINR') res = Math.min(...nums);
            else                   res = nums.reduce((a, b) => a + b, 0);
            scheduleWrite(r, rightStart, res);
          }
          break;
        }
      }

      c += span;
    }
  }

  flushWrites();
  renderGrid();
}

function toggleRun() {
  running = !running;
  if (running) runInterval = setInterval(tick, 600);
  else clearInterval(runInterval);
}

function resetGrid() {
  running = false; clearInterval(runInterval);
  tickCount = 0; lastScans = []; lastWrites = [];
  document.getElementById('tick-display').textContent = 'tick: 0';
  document.getElementById('log').innerHTML = '';
  initGrid(); renderGrid();
}

function loadExample() {
  resetGrid();
  // Row 0: barrier demo - 1 2 3 barrier 4 5 6 MAXR -> should get 6 (max of 4,5,6)
  grid[0][0].value = '1';
  grid[0][1].value = '2';
  grid[0][2].value = '3';
  grid[0][3].value = 'barrier';
  grid[0][4].value = '4';
  grid[0][5].value = '5';
  grid[0][6].value = '6';
  grid[0][7].value = 'MAXR';

  // Row 2: MINR - same setup, gets min of 4,5,6 = 4
  grid[2][0].value = '1';
  grid[2][1].value = '2';
  grid[2][2].value = '3';
  grid[2][3].value = 'sep';
  grid[2][4].value = '4';
  grid[2][5].value = '5';
  grid[2][6].value = '6';
  grid[2][7].value = 'MINR';

  // Row 4: SUMALLR - no barrier, gets sum of all: 10+20+30 = 60
  grid[4][0].value = '10';
  grid[4][1].value = '20';
  grid[4][2].value = '30';
  grid[4][3].value = 'SUMALLR';

  // Row 6: IFGR feeding PICKD with MAXR result
  grid[6][0].value = '1';
  grid[6][1].value = '2';
  grid[6][2].value = '3';
  grid[6][3].value = 'wall';
  grid[6][4].value = '9';
  grid[6][5].value = '7';
  grid[6][6].value = '5';
  grid[6][7].value = 'MAXR';   // -> 9
  // result lands at col 9
  grid[6][10].value = '5';
  grid[6][11].value = 'IFGR';  // 9 > 5 -> 1
  // result at col 13
  grid[6][14].value = 'PICKD';
  grid[6][17].value = 'low';
  grid[6][21].value = 'high';

  renderGrid();
}

function renderGrid() {
  let wrap = document.getElementById('table-wrap');
  let html = '<table style="table-layout:fixed;"><colgroup>';
  for (let c = 0; c < COLS; c++) html += '<col style="width:28px">';
  html += '</colgroup>';

  for (let r = 0; r < ROWS; r++) {
    let ownerMap = buildOwnerMap(r);
    html += '<tr>';
    let c = 0;
    while (c < COLS) {
      if (ownerMap[c] !== c) { c++; continue; }
      let v    = grid[r][c].value.trim();
      let span = (v !== '' && v !== '.') ? Math.min(cellSpan(v), COLS - c) : 1;
      let type = cellType(v);
      let isSel = selectedCell && selectedCell.r === r && selectedCell.c === c;
      html += `<td class="${type}${isSel?' selected':''}" colspan="${span}" data-r="${r}" data-c="${c}" onclick="selectCell(${r},${c})">`;
      if (isSel) {
        html += `<input id="cell-input" value="${grid[r][c].value}" onblur="commitCell(${r},${c},this.value)" onkeydown="cellKey(event,${r},${c})" style="min-width:${Math.max(80,span*28)}px;" />`;
      } else {
        html += `<span class="cell-label">${v}</span>`;
      }
      html += '</td>';
      c += span;
    }
    html += '</tr>';
  }
  html += '</table>';
  wrap.innerHTML = html;

  if (selectedCell) {
    let inp = document.getElementById('cell-input');
    if (inp) { inp.focus(); inp.select(); }
  }

  drawOverlay();
}

function drawOverlay() {
  let canvas  = document.getElementById('overlay');
  let show    = document.getElementById('show-overlay').checked;
  let tableEl = document.querySelector('#table-wrap table');
  if (!tableEl) return;

  let tw = tableEl.offsetWidth  || COLS * COL_W;
  let th = tableEl.offsetHeight || ROWS * ROW_H;
  canvas.width  = tw; canvas.height = th;
  canvas.style.width = tw + 'px'; canvas.style.height = th + 'px';

  let ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, tw, th);
  if (!show) return;

  let byRow = {};
  for (let s of lastScans) {
    if (!byRow[s.r]) byRow[s.r] = [];
    byRow[s.r].push(s);
  }

  const BAND = 5, PAD = 1;

  for (let rk in byRow) {
    let ri = Number(rk);
    let scans = byRow[rk];
    let rowY  = ri * ROW_H;
    for (let i = 0; i < scans.length; i++) {
      let s  = scans[i];
      let v2 = grid[ri][s.toOwnerC] ? grid[ri][s.toOwnerC].value.trim() : '';
      let x1 = s.fromOwnerC * COL_W;
      let x2 = (s.toOwnerC + cellSpan(v2)) * COL_W;
      let y  = rowY + PAD + i * (BAND + 2);
      let w  = x2 - x1;
      let h  = BAND;

      ctx.fillStyle   = OP_FILL[s.op]   || 'rgba(200,200,200,0.1)';
      ctx.fillRect(x1, y, w, h);
      ctx.strokeStyle = OP_STROKE[s.op] || 'rgba(200,200,200,0.6)';
      ctx.lineWidth   = 1;
      ctx.strokeRect(x1 + 0.5, y + 0.5, w - 1, h - 1);
      ctx.fillStyle   = OP_STROKE[s.op] || '#aaa';
      ctx.font        = '7px monospace';
      ctx.fillText(s.op, x1 + 2, y + h - 1);
    }
  }

  for (let w of lastWrites) {
    let x = w.c * COL_W + COL_W / 2;
    let y = w.r * ROW_H + ROW_H / 2;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(100,255,100,0.9)';
    ctx.fill();
  }
}

function selectCell(r, c) {
  selectedCell = { r, c: getOwnerCol(r, c) };
  renderGrid();
}
function commitCell(r, c, val) {
  grid[r][c].value = val; selectedCell = null; renderGrid();
}
function cellKey(e, r, c) {
  if (e.key === 'Enter' || e.key === 'Tab') {
    e.preventDefault();
    commitCell(r, c, e.target.value);
    let span = cellSpan(grid[r][c].value.trim());
    let nr = r, nc = c;
    if (e.key === 'Tab') nc = Math.min(c + span, COLS - 1);
    else                 nr = Math.min(r + 1, ROWS - 1);
    selectedCell = { r: nr, c: nc };
    renderGrid();
  } else if (e.key === 'Escape') { selectedCell = null; renderGrid(); }
}

initGrid();
renderGrid();
</script>
</body>
</html>
