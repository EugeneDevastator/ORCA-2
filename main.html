<!DOCTYPE html>
<html>
<head>
<title>Grid Lang</title>
<style>
  body { background: #1a1a1a; color: #ccc; font-family: monospace; margin: 20px; }
  h2 { color: #fff; }
  #grid-container { overflow: auto; margin-bottom: 16px; position: relative; display: inline-block; }
  table { border-collapse: collapse; position: relative; z-index: 1; table-layout: fixed; }
  td {
    border: 1px solid #333; padding: 6;
    width: 20px; height: 20px; min-width: 20px; max-width: 20px;
    position: relative; overflow: visible;
    box-sizing: border-box; cursor: default;
  }
  td.empty         { background: #111; }
  td.number-cell   { background: #111; }
  td.operator-cell { background: #2a1a1a; }
  td.string-cell   { background: #111; }
  td.selected { outline: 2px solid #aaa; z-index: 10; }
  td.overflow-ghost {
    background: #111 !important;
    border-left-color: transparent !important;
    border-right-color: transparent !important;
  }
  td.has-overflow {
    border-right-color: transparent !important;
  }
  td span.cell-label {
    display: block; white-space: nowrap;
    font-size: 12px; line-height: 20px;
    padding: 0 3px; pointer-events: none;
    position: relative; z-index: 2;
    overflow: hidden;
  }
  td span.cell-label.overflow-label {
    overflow: visible;
  }
  td.empty span.cell-label    { color: #111; }
  td.number-cell span.cell-label   { color: #6af; }
  td.operator-cell span.cell-label { color: #fa6; }
  td.string-cell span.cell-label   { color: #a6f; }
  td input {
    position: absolute; top: 0; left: 0;
    width: 120px; height: 20px;
    background: #222; border: 1px solid #888;
    color: #fff; font-family: monospace; font-size: 12px;
    padding: 0 3px; box-sizing: border-box; outline: none; z-index: 20;
  }
  #controls { margin-bottom: 12px; }
  button { background: #333; color: #ccc; border: 1px solid #555; padding: 4px 10px; margin-right: 6px; cursor: pointer; font-family: monospace; }
  button:hover { background: #444; }
  #log { background: #111; border: 1px solid #333; padding: 8px; height: 80px; overflow-y: auto; font-size: 12px; }
  .log-tick  { color: #888; }
  .log-write { color: #8f8; }
  #tick-display { color: #aaa; font-size: 12px; margin-left: 12px; }
  #overlay { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }
</style>
</head>
<body>
<h2>Grid Lang Demo</h2>
<div id="controls">
  <button onclick="tick()">Tick</button>
  <button onclick="toggleRun()">Run</button>
  <button onclick="resetGrid()">Reset</button>
  <button onclick="loadExample()">Load Example</button>
  <label style="margin-left:12px; font-size:12px;">
    <input type="checkbox" id="show-overlay" checked onchange="drawOverlay()"> show scans
  </label>
  <span id="tick-display">tick: 0</span>
</div>
<div id="grid-container">
  <canvas id="overlay"></canvas>
  <div id="table-wrap"></div>
</div>
<div style="margin-bottom:6px; font-size:12px; color:#888;">
  Operators: SUMD SUMR MULD MULR IFGR PICKD SUM_TWICE_D F MAXR MINR SUMALLR
</div>
<div id="log"></div>

<script>
const ROWS = 14;
const COLS = 44;
const CELL_W = 20;
const CELL_H = 20;

let grid = [];
let shadow = [];
let tickCount = 0;
let running = false;
let runInterval = null;
let selR = 0, selC = 0;
let editing = false;
let lastScans = [];
let lastWrites = [];

const OPERATORS = ['SUMD','SUMR','MULD','MULR','IFGR','PICKD','SUM_TWICE_D','F','MAXR','MINR','SUMALLR'];

function opSpan(name) { return Math.max(1, Math.ceil((name.length) / 3)); }
function isOperator(v) { return OPERATORS.includes(v.trim().toUpperCase()); }
function isNumber(v)   { let s = v.trim(); return s !== '' && !isNaN(Number(s)); }
function cellType(v) {
  let s = v.trim();
  if (s === '' || s === '.') return 'empty';
  if (isNumber(s)) return 'number-cell';
  if (isOperator(s)) return 'operator-cell';
  return 'string-cell';
}
function cellSpan(v) {
  let s = v.trim();
  if (!isOperator(s)) return 1;
  return opSpan(s.toUpperCase());
}

function initGrid() {
  grid = [];
  shadow = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    shadow[r] = [];
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = { value: '' };
      shadow[r][c] = null;
    }
  }
}

function initShadow() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      shadow[r][c] = null;
}

function buildOwnerMap(r) {
  let map = new Array(COLS).fill(-1);
  let c = 0;
  while (c < COLS) {
    let v = grid[r][c].value.trim();
    if (v !== '' && v !== '.') {
      let span = Math.min(cellSpan(v), COLS - c);
      for (let i = 0; i < span; i++) map[c + i] = c;
      c += span;
    } else { map[c] = c; c++; }
  }
  return map;
}

function readCellRaw(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return '';
  if (shadow[r][c] !== null) return shadow[r][c];
  return grid[r][c].value;
}

function getOwnerCol(r, c) {
  for (let cc = c; cc >= 0; cc--) {
    let v = readCellRaw(r, cc).trim();
    if (v === '' || v === '.') continue;
    let span = cellSpan(v);
    if (cc + span - 1 >= c) return cc;
    break;
  }
  return c;
}

function readVal(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  let owner = getOwnerCol(r, c);
  let v = readCellRaw(r, owner).trim();
  if (v === '' || v === '.') return null;
  if (isNumber(v)) return Number(v);
  return v;
}

function readLeftN(r, c, n) {
  let vals = [], cols = [];
  let cc = c - 1;
  while (cc >= 0 && vals.length < n) {
    let owner = getOwnerCol(r, cc);
    let v = readCellRaw(r, owner).trim();
    if (v !== '' && v !== '.') {
      vals.unshift(isNumber(v) ? Number(v) : v);
      cols.unshift(owner);
      cc = owner - 1;
    } else cc--;
  }
  return { vals, cols };
}

function readContiguousNumbersLeft(r, c) {
  let nums = [], cols = [];
  let cc = c - 1;
  while (cc >= 0) {
    let owner = getOwnerCol(r, cc);
    let v = readCellRaw(r, owner).trim();
    if (v === '' || v === '.') { cc = owner - 1; continue; }
    if (isNumber(v)) {
      nums.unshift(Number(v));
      cols.unshift(owner);
      cc = owner - 1;
    } else break;
  }
  return { nums, cols };
}

function nextNonEmptyRight(r, startC) {
  for (let c = startC; c < COLS; c++) {
    let v = readCellRaw(r, c).trim();
    if (v !== '' && v !== '.') return c;
  }
  return -1;
}

function nthNonEmptyRight(r, startC, n) {
  let found = 0, c = startC;
  while (c < COLS) {
    let v = readCellRaw(r, c).trim();
    if (v !== '' && v !== '.') {
      found++;
      if (found === n+1) return c;
      c += cellSpan(v);
    } else c++;
  }
  return -1;
}

function cellEndCol(r, ownerC) {
  if (ownerC < 0 || ownerC >= COLS) return ownerC;
  let v = readCellRaw(r, ownerC).trim();
  return ownerC + cellSpan(v) - 1;
}

let pendingWrites = [];
function writeCell(r, c, val) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
  let s = String(val);
  shadow[r][c] = s;
  pendingWrites.push({ r, c, val: s });
}

function flushWrites() {
  lastWrites = [];
  for (let w of pendingWrites) {
    grid[w.r][w.c].value = w.val;
    lastWrites.push({ r: w.r, c: w.c });
    log(`  write [${w.r},${w.c}] = ${w.val}`, 'log-write');
  }
  pendingWrites = [];
}

function log(msg, cls) {
  let el = document.getElementById('log');
  let d = document.createElement('div');
  d.className = cls || '';
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function recordScan(r, fromOwnerC, toOwnerC, op) {
  if (toOwnerC < fromOwnerC) toOwnerC = fromOwnerC;
  lastScans.push({ r, fromOwnerC, toOwnerC, op });
}

function tick() {
  tickCount++;
  document.getElementById('tick-display').textContent = 'tick: ' + tickCount;
  log(`--- tick ${tickCount} ---`, 'log-tick');
  pendingWrites = [];
  lastScans = [];
  initShadow();

  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      let raw  = grid[r][c].value.trim();
      let v    = raw.toUpperCase();
      let span = cellSpan(raw);
      if (!isOperator(raw)) { c++; continue; }

      let opEndC     = c + span - 1;
      let rightStart = c + span;

      switch (v) {
        case 'SUMR': case 'SUMD': {
          let { vals, cols } = readLeftN(r, c, 2);
          let fromC = cols.length > 0 ? cols[0] : c;
          recordScan(r, fromC, opEndC, v);
          if (vals.length >= 2) {
            let res = Number(vals[0]) + Number(vals[1]);
            if (v === 'SUMR') writeCell(r, rightStart, res);
            else              writeCell(r + 1, c, res);
          }
          break;
        }
        case 'MULR': case 'MULD': {
          let { vals, cols } = readLeftN(r, c, 2);
          let fromC = cols.length > 0 ? cols[0] : c;
          recordScan(r, fromC, opEndC, v);
          if (vals.length >= 2) {
            let res = Number(vals[0]) * Number(vals[1]);
            if (v === 'MULR') writeCell(r, rightStart, res);
            else              writeCell(r + 1, c, res);
          }
          break;
        }
        case 'SUM_TWICE_D': {
          let { vals: lv, cols: lc } = readLeftN(r, c, 1);
          let rc    = nextNonEmptyRight(r, rightStart);
          let fromC = lc.length > 0 ? lc[0] : c;
          let toC   = rc >= 0 ? cellEndCol(r, rc) : opEndC;
          recordScan(r, fromC, toC, v);
          if (lv.length >= 1 && rc >= 0) {
            let B = readVal(r, rc);
            writeCell(r + 1, c, (Number(lv[0]) + Number(B)) * 2);
          }
          break;
        }
        case 'IFGR': {
          let { vals, cols } = readLeftN(r, c, 2);
          let fromC = cols.length > 0 ? cols[0] : c;
          recordScan(r, fromC, opEndC, v);
          if (vals.length >= 2)
            writeCell(r, rightStart, Number(vals[0]) > Number(vals[1]) ? 1 : 0);
          break;
        }
        case 'PICKD': {
          let { vals, cols } = readLeftN(r, c, 1);
          if (vals.length >= 1) {
            let idx = Math.round(Number(vals[0]));
            if (idx >= 0) {
              let tc    = nthNonEmptyRight(r, rightStart, idx);
              let fromC = cols[0];
              let toC   = tc >= 0 ? cellEndCol(r, tc) : opEndC;
              recordScan(r, fromC, toC, v);
              if (tc >= 0) {
                let picked = readVal(r, tc);
                if (picked !== null) writeCell(r + 1, c, picked);
              }
            }
          }
          break;
        }
        case 'F': {
          let { vals, cols } = readLeftN(r, c, 1);
          let tc    = nextNonEmptyRight(r, rightStart);
          let fromC = cols.length > 0 ? cols[0] : c;
          let toC   = tc >= 0 ? cellEndCol(r, tc) : opEndC;
          recordScan(r, fromC, toC, v);
          if (vals.length >= 1 && tc >= 0)
            writeCell(r, tc, vals[0]);
          break;
        }
        case 'MAXR': case 'MINR': case 'SUMALLR': {
          let { nums, cols } = readContiguousNumbersLeft(r, c);
          let fromC = cols.length > 0 ? cols[0] : c;
          recordScan(r, fromC, opEndC, v);
          if (nums.length > 0) {
            let res;
            if (v === 'MAXR')      res = Math.max(...nums);
            else if (v === 'MINR') res = Math.min(...nums);
            else                   res = nums.reduce((a, b) => a + b, 0);
            writeCell(r, rightStart, res);
          }
          break;
        }
      }

      c += span;
    }
  }

  flushWrites();
  renderGrid();
}

function toggleRun() {
  running = !running;
  if (running) runInterval = setInterval(tick, 600);
  else clearInterval(runInterval);
}

function resetGrid() {
  running = false; clearInterval(runInterval);
  tickCount = 0; lastScans = []; lastWrites = [];
  document.getElementById('tick-display').textContent = 'tick: 0';
  document.getElementById('log').innerHTML = '';
  initGrid(); renderGrid();
}

function loadExample() {
  resetGrid();
  grid[0][0].value = '1';
  grid[0][1].value = '1';
  grid[0][2].value = 'SUMR';
  grid[0][5].value = 'PICKD';
  grid[0][8].value = 'asdf';
  grid[0][12].value = 'fdfd';
  grid[0][16].value = '3fd';

  grid[2][0].value = '1';
  grid[2][1].value = '2';
  grid[2][2].value = '3';
  grid[2][3].value = 'wall';
  grid[2][4].value = '4';
  grid[2][5].value = '5';
  grid[2][6].value = '6';
  grid[2][7].value = 'MAXR';

  grid[4][0].value = '5';
  grid[4][1].value = 'SUM_TWICE_D';
  grid[4][5].value = '3';

  renderGrid();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const CHAR_W = 7;
const CELL_PAD = 6;

function countEmptyRight(r, c) {
  let count = 0;
  for (let cc = c + 1; cc < COLS; cc++) {
    let v = grid[r][cc].value.trim();
    if (v === '' || v === '.') count++;
    else break;
  }
  return count;
}

// Returns per-col ghost info: ghost[c] = ownerCol if ghosted, else -1
function buildGhostSet(r) {
  let ghost = new Int16Array(COLS).fill(-1);
  for (let c = 0; c < COLS; c++) {
    let v = grid[r][c].value.trim();
    if (v === '' || v === '.' || isOperator(v)) continue;
    let textPx = v.length * CHAR_W + CELL_PAD;
    if (textPx <= CELL_W) continue;
    let emptyAfter = countEmptyRight(r, c);
    if (emptyAfter === 0) continue;
    let spillCols = Math.min(Math.ceil((textPx - CELL_W) / CELL_W), emptyAfter);
    for (let i = 1; i < spillCols; i++) ghost[c + i] = c;
  }
  return ghost;
}

function renderGrid() {
  let wrap = document.getElementById('table-wrap');
  let html = '<table><colgroup>';
  for (let c = 0; c < COLS; c++) html += `<col style="width:${CELL_W}px">`;
  html += '</colgroup>';

  for (let r = 0; r < ROWS; r++) {
    let om    = buildOwnerMap(r);
    let ghost = buildGhostSet(r);
    html += '<tr>';
    let c = 0;
    while (c < COLS) {
      if (om[c] !== c) { c++; continue; }
      let v    = grid[r][c].value.trim();
      let span = (v !== '' && v !== '.') ? Math.min(cellSpan(v), COLS - c) : 1;
      let type = cellType(v);
      let isSel = (r === selR && c === selC);

      let isGhost = (ghost[c] !== -1);

      // Check if this literal cell has overflow spill into ghost cols to its right
      // If so, mark it so we can hide its right border (border-collapse shares it with ghost's left)
      let hasOverflow = false;
      if (!isGhost && v !== '' && v !== '.' && !isOperator(v)) {
        let textPx = v.length * CHAR_W + CELL_PAD;
        if (textPx > CELL_W && countEmptyRight(r, c) > 0) {
          hasOverflow = true;
        }
      }

      let tdClass = isGhost ? 'empty overflow-ghost' : type;
      if (isSel) tdClass += ' selected';
      if (hasOverflow) tdClass += ' has-overflow';

      html += `<td class="${tdClass}" colspan="${span}" onclick="clickCell(${r},${c})">`;

      if (!isGhost) {
        if (isSel && editing) {
          html += `<input id="cell-input" value="${escHtml(grid[r][c].value)}" `
                + `onkeydown="inputKey(event)" />`;
        } else {
          let spanClass = 'cell-label' + (hasOverflow ? ' overflow-label' : '');
          html += `<span class="${spanClass}">${escHtml(v)}</span>`;
        }
      }

      html += '</td>';
      c += span;
    }
    html += '</tr>';
  }
  html += '</table>';
  wrap.innerHTML = html;

  if (editing) {
    let inp = document.getElementById('cell-input');
    if (inp) {
      inp.focus();
      let len = inp.value.length;
      inp.setSelectionRange(len, len);
    }
  }

  drawOverlay();
}

document.addEventListener('keydown', function(e) {
  let isArrow = ['ArrowRight','ArrowLeft','ArrowUp','ArrowDown'].includes(e.key);

  if (isArrow) {
    e.preventDefault();
    if (editing) commitEdit();
    editing = false;
    let dr = e.key === 'ArrowDown' ? 1 : e.key === 'ArrowUp' ? -1 : 0;
    let dc = e.key === 'ArrowRight' ? 1 : e.key === 'ArrowLeft' ? -1 : 0;
    moveSelection(dr, dc);
    renderGrid();
    return;
  }

  if (editing) return;

  if (e.key === 'Enter' || e.key === 'F2') {
    e.preventDefault();
    editing = true;
    renderGrid();
    return;
  }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    e.preventDefault();
    grid[selR][selC].value = '';
    renderGrid();
    return;
  }
  if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
    grid[selR][selC].value = '';
    editing = true;
    renderGrid();
  }
});

function inputKey(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    commitEdit(); editing = false;
    moveSelection(1, 0);
    renderGrid();
    return;
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    commitEdit(); editing = false;
    moveSelection(0, 1);
    renderGrid();
    return;
  }
  if (e.key === 'Escape') {
    e.preventDefault();
    editing = false;
    renderGrid();
    return;
  }
  let isArrow = ['ArrowRight','ArrowLeft','ArrowUp','ArrowDown'].includes(e.key);
  if (isArrow) {
    e.preventDefault();
    commitEdit(); editing = false;
    let dr = e.key === 'ArrowDown' ? 1 : e.key === 'ArrowUp' ? -1 : 0;
    let dc = e.key === 'ArrowRight' ? 1 : e.key === 'ArrowLeft' ? -1 : 0;
    moveSelection(dr, dc);
    renderGrid();
  }
}

function commitEdit() {
  let inp = document.getElementById('cell-input');
  if (inp) grid[selR][selC].value = inp.value;
}

function clickCell(r, c) {
  if (editing) commitEdit();
  selR = r; selC = getOwnerCol(r, c);
  editing = true;
  renderGrid();
}

function moveSelection(dr, dc) {
  if (dc > 0) {
    let span = cellSpan(grid[selR][selC].value.trim());
    selC = Math.min(selC + span, COLS - 1);
  } else if (dc < 0) {
    let nc = selC - 1;
    if (nc >= 0) selC = getOwnerCol(selR, nc);
    else selC = 0;
  } else {
    selR = Math.max(0, Math.min(ROWS - 1, selR + dr));
    selC = Math.min(selC, COLS - 1);
    selC = getOwnerCol(selR, selC);
  }
}

const OP_FILL = {
  'SUMR':'rgba(100,180,255,0.13)','SUMD':'rgba(100,180,255,0.13)',
  'MULR':'rgba(255,160,80,0.13)', 'MULD':'rgba(255,160,80,0.13)',
  'SUM_TWICE_D':'rgba(100,255,180,0.13)',
  'IFGR':'rgba(255,100,180,0.13)',
  'PICKD':'rgba(200,200,80,0.13)',
  'F':'rgba(180,100,255,0.13)',
  'MAXR':'rgba(255,80,80,0.13)',
  'MINR':'rgba(80,255,220,0.13)',
  'SUMALLR':'rgba(180,255,80,0.13)',
};
const OP_STROKE = {
  'SUMR':'rgba(100,180,255,0.8)','SUMD':'rgba(100,180,255,0.8)',
  'MULR':'rgba(255,160,80,0.8)', 'MULD':'rgba(255,160,80,0.8)',
  'SUM_TWICE_D':'rgba(100,255,180,0.8)',
  'IFGR':'rgba(255,100,180,0.8)',
  'PICKD':'rgba(200,200,80,0.8)',
  'F':'rgba(180,100,255,0.8)',
  'MAXR':'rgba(255,80,80,0.8)',
  'MINR':'rgba(80,255,220,0.8)',
  'SUMALLR':'rgba(180,255,80,0.8)',
};

function drawOverlay() {
  let canvas  = document.getElementById('overlay');
  let show    = document.getElementById('show-overlay').checked;
  let tw = COLS * CELL_W;
  let th = ROWS * CELL_H;
  canvas.width = tw; canvas.height = th;
  canvas.style.width = tw + 'px'; canvas.style.height = th + 'px';

  let ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, tw, th);
  if (!show) return;

  let byRow = {};
  for (let s of lastScans) {
    if (!byRow[s.r]) byRow[s.r] = [];
    byRow[s.r].push(s);
  }

  const BAND = 4, PAD = 1;
  for (let rk in byRow) {
    let ri = Number(rk);
    let scans = byRow[rk];
    let rowY  = ri * CELL_H;
    for (let i = 0; i < scans.length; i++) {
      let s  = scans[i];
      let v2 = readCellRaw(ri, s.toOwnerC).trim();
      let x1 = s.fromOwnerC * CELL_W;
      let x2 = (s.toOwnerC + cellSpan(v2)) * CELL_W;
      let y  = rowY + PAD + i * (BAND + 2);
      let w  = x2 - x1;
      let h  = BAND;
      ctx.fillStyle   = OP_FILL[s.op]   || 'rgba(200,200,200,0.1)';
      ctx.fillRect(x1, y, w, h);
      ctx.strokeStyle = OP_STROKE[s.op] || 'rgba(200,200,200,0.6)';
      ctx.lineWidth   = 1;
      ctx.strokeRect(x1 + 0.5, y + 0.5, w - 1, h - 1);
      ctx.fillStyle   = OP_STROKE[s.op] || '#aaa';
      ctx.font        = '7px monospace';
      ctx.fillText(s.op, x1 + 2, y + h - 1);
    }
  }

  for (let w of lastWrites) {
    let x = w.c * CELL_W + CELL_W / 2;
    let y = w.r * CELL_H + CELL_H / 2;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(100,255,100,0.9)';
    ctx.fill();
  }
}

initGrid();
renderGrid();
</script>
